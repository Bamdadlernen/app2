<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AnkiPro – HOSSAIN B2</title>
<!-- No external SDK - uses direct REST API -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
/* ══════════════════════════════════
   TOKENS & RESET
══════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07090d;--s1:#0c1018;--s2:#111722;--s3:#161f2e;--s4:#1b2538;--s5:#202c40;
  --teal:#2dd4bf;--t2:#14b8a6;--t3:#0d9488;--t4:#0a7567;
  --red:#f87171;--r2:#dc2626;--orange:#fb923c;
  --green:#4ade80;--g2:#16a34a;
  --yellow:#facc15;--purple:#a78bfa;--blue:#60a5fa;
  --c1:#f0f4f8;--c2:#94a3b8;--c3:#64748b;--c4:#475569;--c5:#2d3a4a;
  --bd:rgba(255,255,255,0.055);--bd2:rgba(255,255,255,0.09);
  --ra:10px;--rb:14px;--rc:20px;
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--c1);font-family:var(--font);font-size:14px;overflow:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--s5);border-radius:2px}

/* ══════════════════════════════════
   LAYOUT
══════════════════════════════════ */
.app{display:flex;height:100vh}
#sidebar{width:220px;background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;transition:width .3s}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#page-body{flex:1;overflow-y:auto;padding:20px 22px}

/* ══════════════════════════════════
   SIDEBAR
══════════════════════════════════ */
.logo{padding:18px 14px 14px;border-bottom:1px solid var(--bd)}
.logo-row{display:flex;align-items:center;gap:9px}
.logo-gem{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--t3),var(--t4));display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 0 18px rgba(13,148,136,0.4);flex-shrink:0}
.logo-name{font-size:15px;font-weight:800;letter-spacing:-0.5px}
.logo-badge{font-size:9px;color:var(--teal);background:rgba(45,212,191,.1);border:1px solid rgba(45,212,191,.18);padding:2px 7px;border-radius:4px;margin-top:2px;display:inline-block;letter-spacing:1.2px;font-weight:600}
.sync-dot{width:7px;height:7px;border-radius:50%;margin-left:auto;flex-shrink:0;transition:background .3s}
.sync-dot.ok{background:var(--green)}.sync-dot.syncing{background:var(--yellow);animation:blink 1s ease infinite}
.sync-dot.err{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.user-blk{padding:11px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:9px}
.av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--t3),var(--purple));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.u-name{font-size:11px;font-weight:600}.u-sub{font-size:9px;color:var(--c4);margin-top:1px}
.u-xp{height:2px;background:var(--s5);border-radius:1px;margin-top:4px;overflow:hidden}
.u-xp-fill{height:100%;width:68%;background:linear-gradient(90deg,var(--t3),var(--teal))}

.nav{flex:1;overflow-y:auto;padding:8px}
.ns{font-size:9px;color:var(--c5);text-transform:uppercase;letter-spacing:1.5px;padding:9px 8px 3px;font-weight:700}
.ni{display:flex;align-items:center;gap:8px;padding:8px 9px;border-radius:8px;cursor:pointer;font-size:12.5px;color:var(--c3);margin-bottom:1px;transition:all .14s;user-select:none}
.ni:hover{color:var(--c2);background:rgba(255,255,255,.03)}
.ni.on{color:var(--teal);font-weight:600;background:rgba(45,212,191,.08);border:1px solid rgba(45,212,191,.12)}
.ni svg{width:14px;height:14px;flex-shrink:0;stroke-width:2}
.nb{margin-left:auto;font-size:10px;font-weight:700;padding:1px 6px;border-radius:7px;line-height:1.5}
.nb.r{background:rgba(220,38,38,.15);color:var(--red)}.nb.g{background:rgba(13,148,136,.15);color:var(--teal)}

/* ══════════════════════════════════
   TOPBAR
══════════════════════════════════ */
#topbar{height:50px;background:var(--s1);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 18px;gap:12px;flex-shrink:0}
.tb-title{font-size:15px;font-weight:700;flex:1;letter-spacing:-0.3px}
.chip{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:16px;font-size:11px;font-weight:600;border:1px solid}
.chip.fire{background:rgba(250,204,21,.06);border-color:rgba(250,204,21,.14);color:var(--yellow)}
.chip.xp{background:rgba(45,212,191,.05);border-color:rgba(45,212,191,.1);color:var(--teal)}
.xpr{width:70px;height:3px;background:var(--s5);border-radius:2px;overflow:hidden}
.xpf{height:100%;width:68%;background:linear-gradient(90deg,var(--t3),var(--teal))}

/* ══════════════════════════════════
   CARDS / GRID
══════════════════════════════════ */
.card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--rb);padding:18px 20px;margin-bottom:10px}
.card:hover{border-color:var(--bd2)}
.ct{font-size:9.5px;color:var(--c4);text-transform:uppercase;letter-spacing:1.2px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}

/* ══════════════════════════════════
   METRIC
══════════════════════════════════ */
.mc{background:var(--s2);border:1px solid var(--bd);border-radius:var(--ra);padding:13px 15px;transition:all .2s;cursor:default}
.mc:hover{border-color:var(--bd2);transform:translateY(-1px)}
.mv{font-size:28px;font-weight:800;line-height:1;letter-spacing:-1px}
.ml{font-size:9px;color:var(--c4);margin-top:4px;text-transform:uppercase;letter-spacing:.9px}
.mch{font-size:10px;margin-top:3px}
.up{color:var(--green)}.dn{color:var(--red)}.nu{color:var(--c4)}

/* chart */
.cw{position:relative;width:100%}
.cw.h160{height:160px}.cw.h200{height:200px}.cw.h240{height:240px}.cw.h280{height:280px}

/* ══════════════════════════════════
   DECK LIST
══════════════════════════════════ */
.deck-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--ra);cursor:pointer;transition:all .15s;border:1px solid transparent;margin-bottom:6px}
.deck-row:hover{background:var(--s2);border-color:var(--bd)}
.deck-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;border:1px solid var(--bd)}
.deck-info{flex:1;min-width:0}
.deck-name{font-size:13px;font-weight:600;margin-bottom:2px}
.deck-sub{font-size:10px;color:var(--c4)}
.deck-counts{display:flex;gap:5px}
.dc{font-size:12px;font-weight:700;padding:3px 8px;border-radius:7px}
.dc.new{background:rgba(96,165,250,.1);color:var(--blue)}
.dc.lrn{background:rgba(251,146,60,.1);color:var(--orange)}
.dc.rev{background:rgba(74,222,128,.1);color:var(--green)}

/* ══════════════════════════════════
   REVIEW SCREEN
══════════════════════════════════ */
.rev-wrap{display:flex;flex-direction:column;height:100%;padding:14px 18px;gap:10px}
.rev-prog{height:3px;background:var(--s4);border-radius:2px;overflow:hidden;flex-shrink:0}
.rev-prog-fill{height:100%;background:linear-gradient(90deg,var(--t3),var(--teal));transition:width .4s ease}
.flip-scene{flex:1;perspective:1200px;cursor:pointer;min-height:0}
.flip-card{width:100%;height:100%;transition:transform .55s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d;position:relative}
.flip-card.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--rc);border:1px solid var(--bd2);display:flex;flex-direction:column;overflow:hidden}
.fc-front{background:linear-gradient(160deg,var(--s2),var(--s3))}
.fc-back{background:linear-gradient(160deg,var(--s3),var(--s4));transform:rotateY(180deg)}
.fc-hd{padding:12px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.fc-type{font-size:9px;color:var(--c4);text-transform:uppercase;letter-spacing:1.2px;font-weight:700}
.fc-tags{display:flex;gap:4px;flex-wrap:wrap}
.fc-tag{font-size:9px;padding:1px 6px;border-radius:5px;background:var(--s4);color:var(--c3);border:1px solid var(--bd)}
.fc-body{flex:1;display:flex;align-items:center;justify-content:center;padding:16px;flex-direction:column;gap:12px;min-height:0;overflow-y:auto}
.fc-em{font-size:50px;flex-shrink:0}
.fc-sent{font-size:20px;font-weight:700;text-align:center;line-height:1.6;letter-spacing:-0.3px}
.fc-sent .cloze{color:var(--teal);border-bottom:2px solid var(--teal);padding:0 4px}
.fc-sent .blank{color:transparent;background:var(--s5);border-radius:4px;padding:0 18px;user-select:none}
.fc-hint{font-size:11px;color:var(--c4);text-align:center;font-style:italic}
.fc-trans{font-size:15px;color:var(--c2);text-align:center;line-height:1.7}
.fc-gram{background:rgba(45,212,191,.06);border:1px solid rgba(45,212,191,.14);border-radius:var(--ra);padding:11px 13px;width:100%;font-size:11px;line-height:1.8;color:var(--c3)}
.fc-gram strong{color:var(--teal);font-family:var(--mono);font-size:12px}
.fc-gram em{color:var(--yellow)}
.fc-ft{padding:10px 16px;border-top:1px solid var(--bd);text-align:center;flex-shrink:0;font-size:10px;color:var(--c5)}
.ans-row{display:flex;gap:7px;flex-shrink:0}
.ans{flex:1;border:none;border-radius:var(--rb);padding:11px 6px;cursor:pointer;font-weight:700;font-size:12px;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:var(--font)}
.ans:hover{transform:translateY(-2px);filter:brightness(1.15)}
.ans .ai{font-size:9px;font-weight:500;opacity:.7}
.again{background:rgba(220,38,38,.15);color:var(--red);border:1px solid rgba(220,38,38,.25)}
.hard{background:rgba(251,146,60,.12);color:var(--orange);border:1px solid rgba(251,146,60,.22)}
.good{background:rgba(45,212,191,.12);color:var(--teal);border:1px solid rgba(45,212,191,.22)}
.easy{background:rgba(74,222,128,.12);color:var(--green);border:1px solid rgba(74,222,128,.22)}
.done-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:20px;padding:30px;text-align:center}
.done-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:400px}
.ds{background:var(--s2);border:1px solid var(--bd);border-radius:var(--ra);padding:13px;text-align:center}
.ds-v{font-size:22px;font-weight:800}.ds-l{font-size:10px;color:var(--c4);margin-top:2px;text-transform:uppercase;letter-spacing:.8px}

/* ══════════════════════════════════
   BROWSE TABLE
══════════════════════════════════ */
.btable{width:100%;border-collapse:collapse;font-size:12px}
.btable th{padding:8px 10px;text-align:left;font-size:9px;color:var(--c4);text-transform:uppercase;letter-spacing:1px;font-weight:700;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--s1)}
.btable td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.03);vertical-align:middle;max-width:240px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btable tr:hover td{background:rgba(255,255,255,.02)}
.spill{display:inline-block;padding:2px 7px;border-radius:6px;font-size:9px;font-weight:600}
.sn{background:rgba(96,165,250,.1);color:var(--blue)}
.sl{background:rgba(251,146,60,.1);color:var(--orange)}
.sr{background:rgba(74,222,128,.1);color:var(--green)}
.sch{background:rgba(248,113,113,.12);color:var(--red)}

/* ══════════════════════════════════
   ADD CARD FORM
══════════════════════════════════ */
.fl{font-size:10px;color:var(--c4);text-transform:uppercase;letter-spacing:.9px;font-weight:700;margin-bottom:5px;display:block}
.fi{width:100%;background:var(--s2);border:1px solid var(--bd2);border-radius:var(--ra);padding:9px 12px;color:var(--c1);font-size:13px;outline:none;font-family:var(--font);transition:border-color .15s}
.fi:focus{border-color:var(--t3);box-shadow:0 0 0 3px rgba(13,148,136,.09)}
.fi::placeholder{color:var(--c5)}
textarea.fi{resize:vertical;min-height:60px;line-height:1.6}
.fr{margin-bottom:13px}

/* ══════════════════════════════════
   BUTTONS
══════════════════════════════════ */
.btn{background:linear-gradient(135deg,var(--t3),var(--t4));color:#fff;border:none;border-radius:var(--ra);padding:10px 17px;cursor:pointer;font-size:12.5px;font-weight:600;letter-spacing:.3px;transition:all .15s;font-family:var(--font)}
.btn:hover{opacity:.9;box-shadow:0 4px 14px rgba(13,148,136,.35);transform:translateY(-1px)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}
.btn.sec{background:var(--s3);color:var(--c2);border:1px solid var(--bd2);box-shadow:none}
.btn.sec:hover{background:var(--s4);transform:none;box-shadow:none}
.btn.danger{background:rgba(220,38,38,.12);color:var(--red);border:1px solid rgba(220,38,38,.2);box-shadow:none}

/* ══════════════════════════════════
   HEATMAP
══════════════════════════════════ */
.heatmap{display:grid;grid-template-columns:repeat(26,1fr);gap:3px;margin-top:8px}
.hc{aspect-ratio:1;border-radius:2px;cursor:pointer;transition:transform .1s}
.hc:hover{transform:scale(1.4)}
.h0{background:var(--s3)}.h1{background:rgba(13,148,136,.2)}.h2{background:rgba(13,148,136,.4)}.h3{background:rgba(13,148,136,.6)}.h4{background:rgba(13,148,136,.8)}.h5{background:var(--t3)}

/* ══════════════════════════════════
   MODALS
══════════════════════════════════ */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.ov.on{display:flex}
.modal{background:var(--s1);border:1px solid var(--bd2);border-radius:var(--rc);width:500px;max-width:92vw;max-height:88vh;overflow-y:auto;padding:24px;animation:pop .22s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}

/* ══════════════════════════════════
   TOAST
══════════════════════════════════ */
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--s3);border:1px solid var(--bd2);border-radius:24px;padding:9px 18px;font-size:12px;font-weight:500;z-index:500;opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(74,222,128,.3);color:var(--green)}
.toast.bad{border-color:rgba(248,113,113,.3);color:var(--red)}
.toast.warn{border-color:rgba(250,204,21,.3);color:var(--yellow)}

/* ══════════════════════════════════
   LOADING OVERLAY
══════════════════════════════════ */
#loading-screen{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .4s}
#loading-screen.hidden{opacity:0;pointer-events:none}
.spin{width:36px;height:36px;border:3px solid rgba(45,212,191,.15);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══════════════════════════════════
   SKILL BARS
══════════════════════════════════ */
.sk-bar{height:6px;background:var(--s4);border-radius:3px;overflow:hidden;margin-top:5px}
.sk-fill{height:100%;border-radius:3px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}

/* ══════════════════════════════════
   MISC UTILS
══════════════════════════════════ */
.row{display:flex;align-items:center;gap:8px}
.mb10{margin-bottom:10px}.mt8{margin-top:8px}.mt12{margin-top:12px}
.mono{font-family:var(--mono)}
.badge{padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600}
.page-anim{animation:pi .22s ease}
@keyframes pi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.sep{height:1px;background:var(--bd);margin:12px 0}
.voc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.vc{background:var(--s2);border:1px solid var(--bd);border-radius:var(--ra);padding:11px 13px;cursor:pointer;transition:all .15s}
.vc:hover{border-color:var(--t3);background:rgba(45,212,191,.04)}
.vc-w{font-size:13px;font-weight:600;color:var(--c1);margin-bottom:2px}
.vc-t{font-size:10px;color:var(--c4)}.vc-tag{font-size:9px;color:var(--teal);margin-top:3px}
.export-area{background:var(--s2);border:1px solid var(--bd);border-radius:var(--ra);padding:14px;font-family:var(--mono);font-size:11px;max-height:200px;overflow-y:auto;word-break:break-all;color:var(--c3);margin-top:8px}
</style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loading-screen">
  <div style="font-size:32px">🧠</div>
  <div class="spin" id="load-spin"></div>
  <div style="font-size:13px;color:var(--c3);text-align:center;max-width:300px;line-height:1.7;font-family:Inter,sans-serif" id="load-msg">در حال بارگذاری...</div>
  <div style="font-size:11px;color:var(--c5);text-align:center;max-width:280px;font-family:monospace;margin-top:4px" id="load-sub"></div>
  <button id="load-skip-btn" onclick="forceShowKeyPage()" style="display:none;background:rgba(248,113,113,.15);border:1px solid rgba(248,113,113,.3);color:#f87171;padding:8px 18px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:600;margin-top:4px;font-family:Inter,sans-serif">
    ⚠️ رد کردن و ورود دستی کلید
  </button>
</div>

<!-- APP -->
<div class="app" id="app" style="display:none">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="logo">
      <div class="logo-row">
        <div class="logo-gem">🧠</div>
        <div>
          <div class="logo-name">AnkiPro</div>
          <div class="logo-badge">CLOUD · B2</div>
        </div>
        <div class="sync-dot" id="sync-dot" title="Sync-Status"></div>
      </div>
    </div>
    <div class="user-blk">
      <div class="av">HO</div>
      <div style="flex:1;min-width:0">
        <div class="u-name">HOSSAIN</div>
        <div class="u-sub">Level 12 · Cloud-Sync ☁️</div>
        <div class="u-xp"><div class="u-xp-fill" id="xp-fill"></div></div>
      </div>
    </div>
    <div class="nav">
      <div class="ns">Lernen</div>
      <div class="ni on" id="ni-decks" onclick="go('decks')">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Decks <span class="nb r" id="nb-due" style="display:none">0</span>
      </div>
      <div class="ni" id="ni-review" onclick="startReview()">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" stroke-linecap="round"/></svg>
        Wiederholen <span class="nb r" id="nb-rev2" style="display:none">0</span>

<script>
'use strict';

/* ════════════════════════════════════
   MODULE 1: CONFIG & REST API LAYER
   (No SDK - direct fetch to Supabase REST)
════════════════════════════════════ */
const CONFIG = {
  SUPABASE_URL: 'https://jxlhorynzqurpdgvsynm.supabase.co',
  SUPABASE_KEY: localStorage.getItem('sb_api_key') || '',
  NEW_CARDS_PER_DAY: parseInt(localStorage.getItem('new_per_day') || '20'),
};

let SB = null; // Will be our REST helper

/* ── REST helper - replaces Supabase SDK ── */
function makeSB(url, key) {
  const base = url + '/rest/v1';
  const headers = {
    'apikey': key,
    'Authorization': 'Bearer ' + key,
    'Content-Type': 'application/json',
  };

  async function req(method, table, params, body) {
    params = params || {};
    let qs = Object.entries(params).map(([k,v]) => k + '=' + encodeURIComponent(v)).join('&');
    const fullUrl = base + '/' + table + (qs ? '?' + qs : '');
    const opts = { method: method, headers: { ...headers } };
    if (body !== undefined) opts.body = JSON.stringify(body);
    if (method === 'POST') opts.headers['Prefer'] = 'return=representation';
    if (method === 'PATCH') opts.headers['Prefer'] = 'return=representation';
    try {
      const resp = await fetch(fullUrl, opts);
      if (!resp.ok) {
        const errText = await resp.text();
        return { data: null, error: { message: errText, status: resp.status } };
      }
      const text = await resp.text();
      const data = text ? JSON.parse(text) : [];
      return { data, error: null };
    } catch (e) {
      return { data: null, error: { message: e.message } };
    }
  }

  return {
    from: function(table) {
      return {
        select: function(cols) {
          return {
            limit: function(n) {
              return req('GET', table, { select: cols || '*', limit: n });
            },
            order: function(col) {
              return req('GET', table, { select: cols || '*', order: col });
            },
            eq: function(col, val) {
              return req('GET', table, { select: cols || '*', [col]: 'eq.' + val });
            },
            then: function(resolve) {
              return req('GET', table, { select: cols || '*' }).then(resolve);
            }
          };
        },
        insert: function(rows) {
          const arr = Array.isArray(rows) ? rows : [rows];
          return {
            select: function() {
              return { single: function() { return req('POST', table, {}, arr); } };
            },
            then: function(resolve) { return req('POST', table, {}, arr).then(resolve); }
          };
        },
        upsert: function(rows, opts2) {
          const arr = Array.isArray(rows) ? rows : [rows];
          const extra = {};
          if (opts2 && opts2.onConflict) extra.on_conflict = opts2.onConflict;
          return req('POST', table, extra, arr);
        },
        update: function(fields) {
          return {
            eq: function(col, val) {
              return req('PATCH', table, { [col]: 'eq.' + val }, fields);
            },
            gte: function(col, val) {
              return req('PATCH', table, { [col]: 'gte.' + val }, fields);
            }
          };
        },
        delete: function() {
          return {
            eq: function(col, val) {
              return req('DELETE', table, { [col]: 'eq.' + val });
            }
          };
        }
      };
    }
  };
}

async function initSupabase() {
  if (!CONFIG.SUPABASE_KEY || CONFIG.SUPABASE_KEY.length < 10) {
    setSyncDot('err');
    return false;
  }
  SB = makeSB(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
  try {
    const ctrl = new AbortController();
    const tid = setTimeout(() => ctrl.abort(), 6000);
    const resp = await fetch(CONFIG.SUPABASE_URL + '/rest/v1/decks?select=id&limit=1', {
      headers: { 'apikey': CONFIG.SUPABASE_KEY, 'Authorization': 'Bearer ' + CONFIG.SUPABASE_KEY },
      signal: ctrl.signal
    });
    clearTimeout(tid);
    if (!resp.ok) { setSyncDot('err'); return false; }
    setSyncDot('ok');
    return true;
  } catch(e) {
    // NetworkError, CORS, timeout - all silent fallback to offline
    setSyncDot('err');
    return false;
  }
}

function setSyncDot(state) {
  const dot = document.getElementById('sync-dot');
  if (dot) dot.className = 'sync-dot ' + state;
}

/* ════════════════════════════════════
   MODULE 2: STATE MANAGEMENT
════════════════════════════════════ */
const STATE = {
  cards: [],        // loaded from Supabase
  decks: [],        // loaded from Supabase
  deckStats: {},    // {deck_id: {total,new,learning,review,due}}
  reviewLog: [],    // daily stats from DB
  settings: {},
  session: { correct: 0, wrong: 0, done: 0 },
  reviewQueue: [],
  reviewIdx: 0,
  revShown: false,
  currentPage: 'decks',
  charts: {},
};

function getCard(id) { return STATE.cards.find(c => c.id === id); }

function getDue() {
  const now = new Date();
  return STATE.cards.filter(c => new Date(c.due) <= now && c.status !== 'leech');
}
function getNew() { return STATE.cards.filter(c => c.status === 'new'); }

/* ════════════════════════════════════
   MODULE 3: DUAL STORAGE
   localStorage = primary (always works)
   Supabase = optional cloud sync
════════════════════════════════════ */

const CLOUD_ENABLED = { value: false };

/* ── localStorage helpers ── */
const LS_KEYS = { cards: 'ap_cards', decks: 'ap_decks', settings: 'ap_settings', log: 'ap_log' };
function lsGet(k) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch(e) { return null; } }
function lsSet(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }

/* ── Supabase REST fetch wrapper ── */
async function sbFetch(method, table, params, body) {
  if (!CONFIG.SUPABASE_KEY) return { ok: false, data: null };
  const base = CONFIG.SUPABASE_URL + '/rest/v1/' + table;
  const qs = params ? '?' + params : '';
  const headers = { 'apikey': CONFIG.SUPABASE_KEY, 'Authorization': 'Bearer ' + CONFIG.SUPABASE_KEY };
  const opts = { method, headers };
  if (body !== undefined) { headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  if (method === 'POST') headers['Prefer'] = 'return=representation';
  try {
    const resp = await fetch(base + qs, opts);
    if (!resp.ok) return { ok: false, data: null, status: resp.status };
    const text = await resp.text();
    return { ok: true, data: text ? JSON.parse(text) : [] };
  } catch(e) {
    return { ok: false, data: null, error: e.message };
  }
}

/* ── Load functions ── */
async function loadDecks() {
  // Try Supabase if connected
  if (CLOUD_ENABLED.value) {
    const r = await sbFetch('GET', 'decks', 'select=*&order=id');
    if (r.ok && r.data && r.data.length > 0) {
      STATE.decks = r.data;
      lsSet(LS_KEYS.decks, r.data);
      setSyncDot('ok');
      return;
    }
  }
  // Fall back to localStorage
  const cached = lsGet(LS_KEYS.decks);
  STATE.decks = cached || [];
  if (!CLOUD_ENABLED.value) setSyncDot('ok');
}

async function loadCards(deckId) {
  if (CLOUD_ENABLED.value) {
    const qs = 'select=*' + (deckId ? '&deck_id=eq.' + encodeURIComponent(deckId) : '') + '&order=created_at';
    const r = await sbFetch('GET', 'cards', qs);
    if (r.ok) {
      if (deckId) {
        STATE.cards = STATE.cards.filter(c => c.deck_id !== deckId).concat(r.data || []);
      } else {
        STATE.cards = r.data || [];
        lsSet(LS_KEYS.cards, STATE.cards);
      }
      setSyncDot('ok');
      return;
    }
  }
  const cached = lsGet(LS_KEYS.cards);
  STATE.cards = cached || [];
}

async function loadSettings() {
  if (CLOUD_ENABLED.value) {
    const r = await sbFetch('GET', 'settings', 'select=*');
    if (r.ok && r.data) {
      r.data.forEach(row => { STATE.settings[row.key] = row.value; });
      lsSet(LS_KEYS.settings, STATE.settings);
      return;
    }
  }
  const cached = lsGet(LS_KEYS.settings);
  if (cached) STATE.settings = cached;
}

async function loadReviewLog() {
  if (CLOUD_ENABLED.value) {
    const r = await sbFetch('GET', 'review_log', 'select=reviewed_at,correct&order=reviewed_at');
    if (r.ok) { STATE.reviewLog = r.data || []; return; }
  }
  STATE.reviewLog = [];
}

/* ── Save functions ── */
function lsSaveCards() { lsSet(LS_KEYS.cards, STATE.cards); }
function lsSaveSettings() { lsSet(LS_KEYS.settings, STATE.settings); }

async function saveCardToDB(card) {
  setSyncDot('syncing');
  if (CLOUD_ENABLED.value) {
    const r = await sbFetch('POST', 'cards', null, card);
    if (r.ok && r.data) {
      const saved = Array.isArray(r.data) ? r.data[0] : r.data;
      STATE.cards.push(saved);
      lsSaveCards();
      setSyncDot('ok');
      updateBadges();
      return saved;
    }
  }
  // localStorage-only mode
  const newCard = { ...card, id: 'local_' + Date.now() + '_' + Math.random().toString(36).slice(2) };
  STATE.cards.push(newCard);
  lsSaveCards();
  setSyncDot('ok');
  updateBadges();
  return newCard;
}

async function updateCardInDB(card) {
  const fields = { interval: card.interval, ef: card.ef, reps: card.reps, lapses: card.lapses, due: card.due, status: card.status, total_reviews: card.total_reviews, correct_reviews: card.correct_reviews, last_review: card.last_review };
  const idx = STATE.cards.findIndex(c => c.id === card.id);
  if (idx >= 0) STATE.cards[idx] = { ...STATE.cards[idx], ...fields };
  lsSaveCards();
  if (CLOUD_ENABLED.value && !String(card.id).startsWith('local_')) {
    sbFetch('PATCH', 'cards', 'id=eq.' + card.id, fields).then(r => {
      setSyncDot(r.ok ? 'ok' : 'err');
    }).catch(() => setSyncDot('err'));
  }
}

async function updateCardFields(id, fields) {
  const idx = STATE.cards.findIndex(c => c.id === id);
  if (idx >= 0) STATE.cards[idx] = { ...STATE.cards[idx], ...fields };
  lsSaveCards();
  if (CLOUD_ENABLED.value && !String(id).startsWith('local_')) {
    sbFetch('PATCH', 'cards', 'id=eq.' + id, fields).catch(() => {});
  }
  setSyncDot('ok');
}

async function deleteCardFromDB(id) {
  STATE.cards = STATE.cards.filter(c => c.id !== id);
  lsSaveCards();
  if (CLOUD_ENABLED.value && !String(id).startsWith('local_')) {
    sbFetch('DELETE', 'cards', 'id=eq.' + id).catch(() => {});
  }
  setSyncDot('ok');
  return true;
}

function logReview(card, rating, correct, efBefore, efAfter, intBefore, intAfter) {
  if (!CLOUD_ENABLED.value) return;
  const row = { card_id: card.id, deck_id: card.deck_id, rating, correct, ef_before: efBefore, ef_after: efAfter, interval_before: intBefore, interval_after: intAfter, reviewed_at: new Date().toISOString() };
  sbFetch('POST', 'review_log', null, row).catch(() => {});
}

async function updateStreak() {
  const today = new Date().toISOString().slice(0,10);
  const last = STATE.settings['last_study_date'] || '';
  const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
  let streak = parseInt(STATE.settings['streak'] || '0');
  if (last === today) return;
  streak = last === yesterday ? streak + 1 : 1;
  STATE.settings['streak'] = String(streak);
  STATE.settings['last_study_date'] = today;
  document.getElementById('streak-n').textContent = streak;
  lsSaveSettings();
  if (CLOUD_ENABLED.value) {
    sbFetch('POST', 'settings', null, [{key:'streak',value:String(streak)},{key:'last_study_date',value:today}]).catch(() => {});
  }
}

async function importCardsFromJSON(jsonArr) {
  setSyncDot('syncing');
  const rows = jsonArr.map(c => ({
    deck_id: c.deck_id||'job', type: c.type||'cloze', front: c.front||'', back: c.back||'',
    grammar: c.grammar||'', image: c.image||'📝', tags: c.tags||[],
    word: c.word||'', translation: c.translation||c.back||'',
    interval:1, ef:2.5, reps:0, lapses:0, due:new Date().toISOString(),
    status:'new', total_reviews:0, correct_reviews:0,
  }));
  if (CLOUD_ENABLED.value) {
    const r = await sbFetch('POST', 'cards', null, rows);
    if (r.ok) {
      STATE.cards.push(...(Array.isArray(r.data) ? r.data : []));
      lsSaveCards(); setSyncDot('ok'); updateBadges();
      return Array.isArray(r.data) ? r.data.length : 0;
    }
  }
  // localStorage fallback
  const now = Date.now();
  const newCards = rows.map((c, i) => ({ ...c, id: 'local_' + (now + i) }));
  STATE.cards.push(...newCards);
  lsSaveCards(); setSyncDot('ok'); updateBadges();
  return newCards.length;
}

/* ── Seed to localStorage ── */
function seedToLocalStorage(force) {
  // Re-seed if forced or if cached data is outdated (fewer cards than SEED_VOC)
  const cachedOk = !force && STATE.decks.length > 0 && STATE.cards.length >= SEED_VOC.length;
  if (cachedOk) return;
  STATE.decks = SEED_DECKS.map(d => ({ ...d }));
  const now = new Date().toISOString();
  const t = Date.now();
  STATE.cards = SEED_VOC.map((v, i) => ({
    id: 'local_' + (t + i), deck_id: v[5], type: 'cloze',
    front: v[6], back: v[1], grammar: v[2], image: v[3], tags: v[4],
    word: v[0], translation: v[1],
    interval:1, ef:2.5, reps:0, lapses:0, due:now, status:'new',
    total_reviews:0, correct_reviews:0, last_review:null,
  }));
  lsSet(LS_KEYS.decks, STATE.decks);
  lsSaveCards();
}

/* ── Seed to Supabase ── */
async function seedDatabase(onProgress) {
  const r1 = await sbFetch('POST', 'decks', 'on_conflict=id', SEED_DECKS);
  if (!r1.ok) console.warn('Deck seed failed');

  const now = new Date().toISOString();
  const rows = SEED_VOC.map(v => ({
    deck_id:v[5], type:'cloze', front:v[6], back:v[1], grammar:v[2], image:v[3], tags:v[4],
    word:v[0], translation:v[1], interval:1, ef:2.5, reps:0, lapses:0,
    due:now, status:'new', total_reviews:0, correct_reviews:0,
  }));
  const BATCH = 25;
  for (let i = 0; i < rows.length; i += BATCH) {
    await sbFetch('POST', 'cards', null, rows.slice(i, i + BATCH));
    if (onProgress) onProgress(Math.min(i + BATCH, rows.length), rows.length);
    await new Promise(r => setTimeout(r, 50));
  }
}

/* ════════════════════════════════════
   MODULE 4: SM-2 ALGORITHM
════════════════════════════════════ */
function sm2(card, q) {
  let { interval, ef, reps, lapses } = card;
  const efBefore = ef, intBefore = interval;
  if (q === 0) { lapses++; interval = 1; reps = 0; ef = Math.max(1.3, ef - 0.2); }
  else if (q === 1) { interval = reps === 0 ? 1 : Math.max(1, Math.round(interval * 1.2)); ef = Math.max(1.3, ef - 0.15); reps++; }
  else if (q === 2) { interval = reps === 0 ? 1 : reps === 1 ? 4 : Math.round(interval * ef); ef = Math.max(1.3, ef + (0.1 - (3 - q) * (0.08 + (3 - q) * 0.02))); reps++; }
  else { interval = reps === 0 ? 4 : reps === 1 ? 6 : Math.round(interval * ef * 1.3); ef += 0.1; reps++; }
  interval = Math.min(interval, 365);
  const due = new Date(Date.now() + interval * 86400000).toISOString();
  const status = lapses >= 4 ? 'leech' : reps > 1 ? 'review' : 'learning';
  return { ...card, interval, ef, reps, lapses, due, status,
    total_reviews: (card.total_reviews || 0) + 1,
    correct_reviews: (card.correct_reviews || 0) + (q > 0 ? 1 : 0),
    last_review: new Date().toISOString(),
    _efBefore: efBefore, _intBefore: intBefore };
}

/* ════════════════════════════════════
   MODULE 5: NAVIGATION
════════════════════════════════════ */
const PAGE_TITLES = {
  decks:'Decks', voc:'Vokabelliste', add:'Neue Karte',
  browse:'Kartenbrowser', stats:'Statistiken', settings:'Einstellungen', review:'Wiederholung', challenge:'Daily Challenge'
};

function go(page) {
  STATE.currentPage = page;
  document.querySelectorAll('.ni').forEach(el => el.classList.remove('on'));
  const el = document.getElementById('ni-' + page);
  if (el) el.classList.add('on');
  document.getElementById('page-title').textContent = PAGE_TITLES[page] || page;
  Object.values(STATE.charts).forEach(c => { try { c.destroy(); } catch(_) {} });
  STATE.charts = {};
  const body = document.getElementById('page-body');
  body.style.animation = 'none';
  requestAnimationFrame(() => { body.style.animation = ''; body.className = 'page-anim'; renderPage(body); });
  updateBadges();
}

function renderPage(b) {
  // Show/hide FAB
  const fab = document.getElementById('fab');
  if (fab) fab.style.display = STATE.currentPage === 'review' ? 'none' : '';
  if (STATE.currentPage === 'decks') renderDecks(b);
  else if (STATE.currentPage === 'voc') renderVoc(b);
  else if (STATE.currentPage === 'add') renderAdd(b);
  else if (STATE.currentPage === 'browse') renderBrowse(b);
  else if (STATE.currentPage === 'stats') renderStats(b);
  else if (STATE.currentPage === 'settings') renderSettings(b);
  else if (STATE.currentPage === 'review') renderReview(b);
  else if (STATE.currentPage === 'challenge') renderChallenge(b);
}

function updateBadges() {
  const n = getDue().length;
  ['nb-due','nb-rev2'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.textContent = n; el.style.display = n ? '' : 'none'; }
  });
  // Challenge badge
  const cb = document.getElementById('nb-chal');
  const today = new Date().toISOString().slice(0,10);
  const chDone = STATE.settings['challenge_date'] === today;
  if (cb) cb.style.display = chDone ? 'none' : '';
}

/* ════════════════════════════════════
   MODULE 6: PAGE – DECKS
════════════════════════════════════ */
function renderDecks(b) {
  const due = getDue().length;
  const total = STATE.cards.length;
  const revCards = STATE.cards.filter(c => c.total_reviews > 0);
  const avgAcc = revCards.length ? Math.round(revCards.reduce((s,c) => s + c.correct_reviews/c.total_reviews, 0)/revCards.length*100) : 0;
  const lch = STATE.cards.filter(c => c.status === 'leech').length;
  const mature = STATE.cards.filter(c => c.interval >= 21).length;

function renderVocGrid() {

async function doSaveCard() {
  const front = (document.getElementById('f-front')||{}).value.trim();
  const back = (document.getElementById('f-back')||{}).value.trim();
  if (!front || !back) { toast('Vorder- und Rückseite sind Pflicht!', 'bad'); return; }
  const tags = ((document.getElementById('f-tags')||{}).value||'').split(',').map(t=>t.trim()).filter(Boolean);
  const word = ((document.getElementById('f-word')||{}).value||'').trim();
  // extract word from {{...}} if not set manually
  const autoWord = word || (front.match(/\{\{([^}]+)\}\}/)?.[1] || '');
  const card = {
    deck_id: (document.getElementById('f-deck')||{}).value || STATE.decks[0]?.id || 'job',
    type: (document.getElementById('f-type')||{}).value || 'cloze',
    front, back, grammar: (document.getElementById('f-gram')||{}).value.trim(),
    image: (document.getElementById('f-emoji')||{}).value||'📝',
    tags, word: autoWord, translation: back,
    interval: 1, ef: 2.5, reps: 0, lapses: 0,
    due: new Date().toISOString(), status: 'new',
    total_reviews: 0, correct_reviews: 0,
  };
  const btn = document.getElementById('save-card-btn');
  if (btn) btn.disabled = true;
  const saved = await saveCardToDB(card);
  if (btn) btn.disabled = false;
  if (saved) {
    toast('✅ Karte gespeichert!', 'ok');
    ['f-front','f-back','f-gram','f-word','f-tags'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
    updatePreview();
  }
}

function doExport() {
  const json = JSON.stringify(STATE.cards.map(c => ({
    deck_id:c.deck_id, type:c.type, front:c.front, back:c.back,
    grammar:c.grammar, image:c.image, tags:c.tags, word:c.word, translation:c.translation
  })), null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='anki_cards_export.json'; a.click();
  URL.revokeObjectURL(url);
  toast('📤 Export abgeschlossen!', 'ok');
}

async function doImport() {
  try {
    const raw = (document.getElementById('import-json')||{}).value.trim();
    const arr = JSON.parse(raw);
    if (!Array.isArray(arr)) throw new Error('Kein Array');
    const count = await importCardsFromJSON(arr);
    toast(`✅ ${count} Karten importiert!`, 'ok');
    document.getElementById('importModal').classList.remove('on');
    go('decks');
  } catch(e) { toast('JSON-Fehler: ' + e.message, 'bad'); }
}

function buildQueue(deckId = null) {
  const now = new Date();
  let cards = deckId ? STATE.cards.filter(c => c.deck_id === deckId) : STATE.cards;
  const lrn = cards.filter(c => c.status === 'learning' && new Date(c.due) <= now);
  const rev = cards.filter(c => c.status === 'review' && new Date(c.due) <= now);
  const nw = cards.filter(c => c.status === 'new').slice(0, CONFIG.NEW_CARDS_PER_DAY);
  STATE.reviewQueue = [...lrn, ...rev, ...nw].filter(c => c.status !== 'leech');
  STATE.reviewIdx = 0; STATE.revShown = false;
  STATE.session = { correct: 0, wrong: 0, done: 0 };
}

function startReview() { buildQueue(); if (!STATE.reviewQueue.length) { toast('Nichts zu wiederholen!', 'ok'); return; } go('review'); }
function startDeckReview(deck) { buildQueue(deck); if (!STATE.reviewQueue.length) { toast('Deck erledigt! ✓', 'ok'); return; } go('review'); }

      <button class="ans easy" onclick="doAnswer(3)">Einfach<span class="ai">${(card.reps||0)<2?4:Math.round((card.interval||1)*(card.ef||2.5)*1.3)}d</span></button>
    </div>
  </div>`;

  b.appendChild(wrap);
  _kbHandler = (e) => {
    if (e.code === 'Space') { e.preventDefault(); if (!STATE.revShown) showAnswer(); }
    else if (e.key === '1' && STATE.revShown) doAnswer(0);
    else if (e.key === '2' && STATE.revShown) doAnswer(1);
    else if (e.key === '3' && STATE.revShown) doAnswer(2);
    else if (e.key === '4' && STATE.revShown) doAnswer(3);
  };
  document.addEventListener('keydown', _kbHandler);
}

function parseCloze(text) {
  const front = text.replace(/\{\{([^}]+)\}\}/g, '<span class="blank">$1</span>');
  const back = text.replace(/\{\{([^}]+)\}\}/g, '<span class="cloze">$1</span>');
  return { front, back };
}

function showAnswer() {
  if (STATE.revShown) return;
  STATE.revShown = true;
  document.getElementById('flip-card').classList.add('flipped');
  document.getElementById('flip-hint').style.display = 'none';
  const ar = document.getElementById('ans-row');
  if (ar) { ar.style.display = 'block'; ar.style.animation = 'pi .2s ease'; }
  playBeep(null);
}

async function doAnswer(q) {
  if (!STATE.revShown) { showAnswer(); return; }
  if (_kbHandler) { document.removeEventListener('keydown', _kbHandler); _kbHandler = null; }
  const card = STATE.reviewQueue[STATE.reviewIdx];
  const updated = sm2(card, q);
  // Log to DB (fire and forget)
  logReview(card, q, q > 0, updated._efBefore, updated.ef, updated._intBefore, updated.interval);
  // Update card in DB
  await updateCardInDB(updated);
  if (q === 0) STATE.session.wrong++; else STATE.session.correct++;
  STATE.session.done++;
  STATE.reviewIdx++;
  STATE.revShown = false;
  lsSaveCards(); // persist after each answer
  document.getElementById('page-body').style.padding = '0';
  renderReview(document.getElementById('page-body'));
  playBeep(q > 0);
  if (STATE.session.done === 1) await updateStreak();
}

function renderDone(b) {
  if (_kbHandler) { document.removeEventListener('keydown', _kbHandler); _kbHandler = null; }
  const { correct, wrong, done } = STATE.session;

  b.style.padding = '20px 22px';

let _ac = null;
function playBeep(ok) {
  try {
    if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
    const o = _ac.createOscillator(), g = _ac.createGain();
    o.connect(g); g.connect(_ac.destination);
    o.frequency.value = ok === null ? 600 : ok ? 880 : 220;
    o.type = ok === false ? 'sawtooth' : 'sine';
    g.gain.setValueAtTime(.07, _ac.currentTime);
    g.gain.exponentialRampToValueAtTime(.001, _ac.currentTime + .2);
    o.start(); o.stop(_ac.currentTime + .2);
  } catch(e) {}
}

function pickCh(i, ans, hint) {
  if (CH_CHOSEN !== null) return;
  CH_CHOSEN = i;
  document.querySelectorAll('[id^="chopt"]').forEach(el => el.style.pointerEvents = 'none');
  document.getElementById('chopt' + ans).classList.add('ok');
  if (i !== ans) document.getElementById('chopt' + i).classList.add('bad');
  const hb = document.getElementById('ch-hint');
  if (hb) { hb.style.display = 'block'; hb.innerHTML = '💡 ' + hint; }
  if (i === ans) { CH_CORRECT++; playBeep(true); } else { CH_WRONG++; playBeep(false); }
  // Save today stats
  const today = new Date().toISOString().slice(0,10);
  STATE.settings['challenge_date'] = today;
  STATE.settings['challenge_today'] = String((parseInt(STATE.settings['challenge_today']||'0') + 1));
  lsSaveSettings();
  setTimeout(() => { CH_CHOSEN = null; CH_IDX++; renderChallenge(document.getElementById('page-body')); }, 2000);
}

function buildProgressRing(pct, size, color) {
  size = size || 60; color = color || 'var(--teal)';
  const r = (size-8)/2, c2 = size/2;
  const circ = 2*Math.PI*r;
  const dash = circ - (pct/100)*circ;
  return `<svg width="${size}" height="${size}" class="prog-ring" viewBox="0 0 ${size} ${size}">
    <circle class="prog-ring-track" cx="${c2}" cy="${c2}" r="${r}"/>
    <circle class="prog-ring-fill" cx="${c2}" cy="${c2}" r="${r}" stroke="${color}"
      stroke-dasharray="${circ}" stroke-dashoffset="${dash}"/>
    <text x="${c2}" y="${c2}" text-anchor="middle" dominant-baseline="middle"
      fill="${color}" font-size="${size*0.22}px" font-weight="700" transform="rotate(90,${c2},${c2})">${pct}%</text>
  </svg>`;
}

function buildStreakCalendar(days) {
  days = days || 28;
  const today = new Date();
  const studiedDates = new Set();
  // Build from review_log or just today
  if (STATE.reviewLog && STATE.reviewLog.length > 0) {
    STATE.reviewLog.forEach(r => { if(r.reviewed_at) studiedDates.add(r.reviewed_at.slice(0,10)); });
  }
  const todayStr = today.toISOString().slice(0,10);
  if (STATE.session && STATE.session.done > 0) studiedDates.add(todayStr);

  let html = '<div class="streak-cal">';
  for (let i = days-1; i >= 0; i--) {
    const d = new Date(Date.now() - i*86400000);
    const ds = d.toISOString().slice(0,10);
    const isToday = ds === todayStr;
    const studied = studiedDates.has(ds);
    const cls = isToday ? 'sc-today' : studied ? 'sc-done' : i < 7 ? 'sc-miss' : 'sc-none';
    const label = d.getDate();
    html += `<div class="sc-day ${cls}" title="${ds}">${label}</div>`;
  }
  html += '</div>';
  return html;
}

/* ── localStorage shorthands ── */
function LS(key) { try { return localStorage.getItem(key); } catch(e) { return null; } }
function LSset(key, val) { try { localStorage.setItem(key, val); } catch(e) {} }
function LSdel(key) { try { localStorage.removeItem(key); } catch(e) {} }

function showLoad(msg, sub) {
  const m = document.getElementById('load-msg');
  const s = document.getElementById('load-sub');
  if (m) m.textContent = msg || '';
  if (s) s.textContent = sub || '';
}
function hideLoadScreen() {
  const ls = document.getElementById('loading-screen');
  if (ls) ls.classList.add('hidden');
  const app = document.getElementById('app');
  if (app) app.style.display = 'flex';
}
function showLoadScreen() {
  const ls = document.getElementById('loading-screen');
  if (ls) { ls.classList.remove('hidden'); ls.style.display = 'flex'; }
  const app = document.getElementById('app');
  if (app) app.style.display = 'none';
}

/* ── Key page ── */

  const b = document.getElementById('page-body');
  if (!b) return;
  err = err || '';
  const savedKey = LS('sb_api_key') || '';
  const errHtml = err ? '<div style="background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);border-radius:var(--ra);padding:10px 14px;font-size:12px;color:var(--red);margin-bottom:14px;line-height:1.6">' + err + '</div>' : '';
  b.innerHTML =
    '<div style="max-width:520px;margin:0 auto">' +
    '<div class="card">' +
      '<div style="text-align:center;padding:8px 0 16px">' +
        '<div style="font-size:36px;margin-bottom:8px">🔑</div>' +
        '<div style="font-size:16px;font-weight:700;margin-bottom:5px">اتصال به Supabase</div>' +
        '<div style="font-size:12px;color:var(--c3);line-height:1.7">با کلید Legacy anon وصل شو یا بدون کلید ادامه بده (حالت آفلاین).</div>' +
      '</div>' +
      errHtml +
      '<div style="background:rgba(74,222,128,.05);border:1px solid rgba(74,222,128,.18);border-radius:var(--ra);padding:11px 13px;font-size:11px;color:var(--c2);line-height:1.9;margin-bottom:14px">' +
        '<strong style="color:var(--green)">✅ Legacy anon key:</strong><br>' +
        'Supabase → Settings → API Keys → تب <strong style="color:var(--yellow)">Legacy anon, service_role API keys</strong> → کپی <strong style="color:var(--teal)">anon public</strong>' +
      '</div>' +
      '<div class="fr"><label class="fl">API Key (اختیاری)</label>' +
        '<textarea class="fi" id="key-input" rows="3" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." style="font-family:monospace;font-size:11px;resize:none">' + savedKey + '</textarea>' +
      '</div>' +
      '<button onclick="doConnect()" class="btn" style="width:100%;padding:13px;font-size:14px;margin-bottom:8px" id="connect-btn">🚀 با Supabase وصل شو</button>' +

/* ── Offline mode ── */
function startOfflineMode() {
  CLOUD_ENABLED.value = false;
  setSyncDot('err');
  showLoad('بارگذاری از حافظه...', '');
  showLoadScreen();
  setTimeout(() => {
    // Load from localStorage first
    const cachedDecks = lsGet(LS_KEYS.decks);
    const cachedCards = lsGet(LS_KEYS.cards);
    const needsReseed = !cachedDecks || !cachedCards || cachedCards.length < SEED_VOC.length;
    if (!needsReseed) {
      STATE.decks = cachedDecks;
      STATE.cards = cachedCards;
    } else {
      // Seed fresh from built-in data (version update or first time)
      STATE.decks = []; STATE.cards = [];
      seedToLocalStorage(true);
    }
    const cachedSettings = lsGet(LS_KEYS.settings);
    if (cachedSettings) STATE.settings = cachedSettings;
    const streak = STATE.settings['streak'] || '0';
    const sEl = document.getElementById('streak-n');
    if (sEl) sEl.textContent = streak;
    updateBadges();
    hideLoadScreen();
    go('decks');
    if (cachedCards && cachedCards.length > 0) {
      toast('📱 ' + STATE.cards.length + ' کارت از حافظه بارگذاری شد', 'ok');
    } else {
      toast('📱 ' + STATE.cards.length + ' کارت آماده – حالت آفلاین', 'ok');
    }
  }, 300);
}

/* ── Connect with key ── */
async function doConnect() {
  const inputEl = document.getElementById('key-input');
  const key = inputEl ? inputEl.value.trim() : '';
  if (!key) { startOfflineMode(); return; }
  if (!key.startsWith('eyJ') && !key.startsWith('sb_')) {
    toast('کلید باید با eyJ یا sb_ شروع بشه', 'bad'); return;
  }
  LSset('sb_api_key', key);
  CONFIG.SUPABASE_KEY = key;
  const btn = document.getElementById('connect-btn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ اتصال...'; }
  await connectAndLoad();
}

/* ── Main loader ── */
async function connectAndLoad() {
  showLoadScreen();
  showLoad('بارگذاری...', '');

  const ok = await initSupabase();

  if (!ok) {
    CLOUD_ENABLED.value = false;
    // Load from cache or seed
    const cachedDecks = lsGet(LS_KEYS.decks);
    const cachedCards = lsGet(LS_KEYS.cards);
    const needsReseed2 = !cachedDecks || !cachedCards || cachedCards.length < SEED_VOC.length;
    if (!needsReseed2) {
      STATE.decks = cachedDecks;
      STATE.cards = cachedCards;
    } else {
      STATE.decks = []; STATE.cards = [];
      seedToLocalStorage(true);
    }
    const cachedSettings = lsGet(LS_KEYS.settings);
    if (cachedSettings) STATE.settings = cachedSettings;
    const streak = STATE.settings['streak'] || '0';
    const sEl = document.getElementById('streak-n');
    if (sEl) sEl.textContent = streak;
    updateBadges();
    hideLoadScreen();
    go('decks');
    // Show status only if key was provided (implies user wanted cloud)
    if (CONFIG.SUPABASE_KEY && CONFIG.SUPABASE_KEY.length > 10) {
      toast('📱 آفلاین – ' + STATE.cards.length + ' کارت از حافظه', 'warn');
    } else {
      toast('📱 ' + STATE.cards.length + ' کارت آماده', 'ok');
    }
    return;
  }

  CLOUD_ENABLED.value = true;

  showLoad('بارگذاری Decks از Cloud...', '');
  await loadDecks();

  if (STATE.decks.length === 0) {
    showLoad('اولین راه‌اندازی – دیتابیس پر میشه...', 'لطفاً صبر کن');
    await seedDatabase((done, total) => showLoad('کارت‌ها: ' + done + ' / ' + total, ''));
    await loadDecks();
  }

  showLoad('بارگذاری کارت‌ها...', STATE.decks.length + ' Deck');
  await loadCards();

  if (STATE.decks.length > 0 && STATE.cards.length === 0) {
    showLoad('کارت‌ها ایجاد میشن...', '');
    await seedDatabase((done, total) => showLoad('کارت‌ها: ' + done + ' / ' + total, ''));
    await loadDecks();
    await loadCards();
  }

  // Also seed localStorage for offline fallback
  lsSet(LS_KEYS.decks, STATE.decks);
  lsSaveCards();

  showLoad('تنظیمات...', '');
  await loadSettings();

  const streak = STATE.settings['streak'] || '0';
  const sEl2 = document.getElementById('streak-n');
  if (sEl2) sEl2.textContent = streak;
  updateBadges();
  hideLoadScreen();
  go('decks');
  toast('☁️ Cloud sync فعال', 'ok');
}

/* ── settings changeKey ── */
async function changeKey() {
  const keyEl = document.getElementById('set-key');
  const key = keyEl ? keyEl.value.trim() : '';
  if (!key || (!key.startsWith('eyJ') && !key.startsWith('sb_'))) {
    toast('کلید نادرست!', 'bad'); return;
  }
  LSset('sb_api_key', key);
  CONFIG.SUPABASE_KEY = key;
  toast('کلید ذخیره شد – اتصال مجدد...', 'ok');
  await connectAndLoad();
}

/* ── saveSettings ── */
async function saveSettings() {
  const nw = document.getElementById('set-new')?.value || '20';
  const rv = document.getElementById('set-rev')?.value || '100';
  CONFIG.NEW_CARDS_PER_DAY = parseInt(nw);
  STATE.settings['new_cards_per_day'] = nw;
  STATE.settings['max_reviews_per_day'] = rv;
  lsSaveSettings();
  if (CLOUD_ENABLED.value) {
    sbFetch('POST', 'settings', null, [{key:'new_cards_per_day',value:nw},{key:'max_reviews_per_day',value:rv}]).catch(() => {});
  }
  toast('✅ ذخیره شد!', 'ok');
}

/* ── resetAllProgress ── */
async function resetAllProgress() {
  if (!confirm('همه پیشرفت‌ها پاک بشن؟')) return;
  const now = new Date().toISOString();
  const fields = { interval:1, ef:2.5, reps:0, lapses:0, status:'new', total_reviews:0, correct_reviews:0, due:now, last_review:null };
  STATE.cards = STATE.cards.map(c => ({ ...c, ...fields }));
  lsSaveCards();
  if (CLOUD_ENABLED.value) {
    sbFetch('PATCH', 'cards', 'interval=gte.0', fields).catch(() => {});
  }
  updateBadges();
  toast('Fortschritt zurückgesetzt', 'warn');
}

/* ── Bootstrap ── */
async function bootstrap() {
  const key = LS('sb_api_key') || '';
  if (!key) {
    // No key saved → load offline immediately, no key page
    CLOUD_ENABLED.value = false;
    const cachedDecks = lsGet(LS_KEYS.decks);
    const cachedCards = lsGet(LS_KEYS.cards);
    const needsReseed2 = !cachedDecks || !cachedCards || cachedCards.length < SEED_VOC.length;
    if (!needsReseed2) {
      STATE.decks = cachedDecks;
      STATE.cards = cachedCards;
    } else {
      STATE.decks = []; STATE.cards = [];
      seedToLocalStorage(true);
    }
    const cachedSettings = lsGet(LS_KEYS.settings);
    if (cachedSettings) STATE.settings = cachedSettings;
    const streak = STATE.settings['streak'] || '0';
    const sEl = document.getElementById('streak-n');
    if (sEl) sEl.textContent = streak;
    updateBadges();
    hideLoadScreen();
    go('decks');
    return;
  }
  CONFIG.SUPABASE_KEY = key;
  await connectAndLoad();
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && e.ctrlKey) {
    const ki = document.getElementById('key-input');
    if (ki && document.activeElement === ki) doConnect();
  }
});

bootstrap();
